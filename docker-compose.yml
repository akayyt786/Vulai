version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: vulnai
      POSTGRES_PASSWORD: vulnai
      POSTGRES_DB: vulnai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    # Use daphne for ASGI/WebSocket support in Phase 2
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock # Mount docker socket for real tool execution
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config.celery worker --loglevel=info --concurrency=3
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock # Worker needs Docker access to run tools
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - web

  # Service just to build the tools image used by executor.py
  tools-builder:
    build:
      context: .
      dockerfile: Dockerfile.tools
    image: vulnai-tools
    command: ["echo", "Tools image built successfully"]

volumes:
  postgres_data:
